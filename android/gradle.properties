# Giới hạn RAM cấp cho Gradle để không gây nghẽn cổ chai (Swap memory)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX
android.useAndroidX=true

# Bắt buộc IPv4 để tránh treo kết nối Google Maven
systemProp.java.net.preferIPv4Stack=true

# Tăng Timeout mạng lên 2 phút phòng khi Windows Defender can thiệp
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.http.socketTimeout=120000
